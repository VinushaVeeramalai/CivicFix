<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CivicFix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Civic<span>Fix</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/issues">Issues</a>
            <a href="/map">Map</a>
            <a href="/login" class="btn-outline">Login</a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Register</h1>
            <div class="alert alert-error" th:if="${error}" th:text="${error}">Error</div>
            <form th:action="@{/register}" method="post" class="auth-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <label for="phone">Phone (optional)</label>
                <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                <button type="submit" class="btn-primary btn-block">Register</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="/login">Login</a></p>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
