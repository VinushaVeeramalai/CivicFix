<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - CivicFix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Civic<span>Fix</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/issues">Issues</a>
            <a href="/map">Map</a>
            <a href="/profile">Profile</a>
            <a href="/logout" class="btn-outline">Logout</a>
        </div>
    </nav>

    <main class="report-page">
        <div class="report-card">
            <h1>Report an Issue</h1>
            <div class="alert alert-error" th:if="${error}" th:text="${error}">Error</div>
            <form th:action="@{/report}" method="post" enctype="multipart/form-data" id="reportForm">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" placeholder="Brief title for the issue" required>

                <label for="category">Category</label>
                <select id="category" name="category">
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Category</option>
                </select>

                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe the issue in detail..."></textarea>

                <div id="severityPreview" class="severity-preview">
                    <span class="label">AI Severity (live preview):</span>
                    <span id="severityValue" class="badge severity medium">Medium</span>
                </div>

                <label for="location">Location (address)</label>
                <div class="location-row">
                    <input type="text" id="location" name="location" placeholder="Street, area, landmark">
                    <button type="button" id="getLocationBtn" class="btn-outline">📍 Get GPS</button>
                </div>
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">

                <label for="image">Photo (optional)</label>
                <input type="file" id="image" name="image" accept="image/*">
                <div id="imagePreview" class="image-preview"></div>

                <button type="submit" class="btn-primary btn-block">Submit Report <span class="pts-hint">+10 pts</span></button>
            </form>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
