<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CivicFix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Civic<span>Fix</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/issues">Issues</a>
            <a href="/map">Map</a>
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Login</h1>
            <div class="alert alert-success" th:if="${success}" th:text="${success}">Success</div>
            <div class="alert alert-error" th:if="${error}" th:text="${error}">Error</div>
            <form th:action="@{/login}" method="post" class="auth-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="submit" class="btn-primary btn-block">Login</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="/register">Register</a></p>
        </div>
    </main>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
